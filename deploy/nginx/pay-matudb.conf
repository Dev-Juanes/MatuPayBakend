# MatuPay — pay.matudb.com → 127.0.0.1:4102
# IMPORTANTE: matudb-hosting usa server_name *.matudb.com → 3004 (MatuDB API).
# Este archivo debe estar habilitado con server_name EXACTO pay.matudb.com
# (nginx lo prioriza sobre el wildcard) y con listen 443.

server {
  listen 80;
  listen [::]:80;
  server_name pay.matudb.com;

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name pay.matudb.com;

  # Certbot (ajusta si tu ruta es distinta):
  ssl_certificate /etc/letsencrypt/live/pay.matudb.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pay.matudb.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 2m;

  location / {
    proxy_pass http://127.0.0.1:4102;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }
}
