# MatuPay API — pay.matudb.com → Node en 4102
# Si otro sitio (p. ej. matudb-api) responde "Route not found", desactiva el server_name duplicado:
#   ls /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/<conflicto-pay>

server {
  listen 80;
  listen [::]:80;
  server_name pay.matudb.com;

  client_max_body_size 2m;

  location / {
    proxy_pass http://127.0.0.1:4102;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }
}
